<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washington Chamber of Commerce | Directory</title>
  <meta name="description" content="Directory of member businesses in Washington. Explore local services, connect with business owners, and support the community.">
  <meta name="author" content="Alex Lybbert">

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Washington Chamber of Commerce - Business Directory">
  <meta property="og:description" content="Explore local Washington businesses and connect with the community.">
  <meta property="og:image" content="images/og-image.svg">
  <meta property="og:url" content="https://example.com/directory.html">
  <meta property="og:type" content="website">

  <!-- Twitter / X Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Washington Chamber of Commerce - Business Directory">
  <meta name="twitter:description" content="Explore local Washington businesses and connect with the community.">
  <meta name="twitter:image" content="images/og-image.svg">

  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">

  <script src="scripts/directory.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="branding">
      <a class="brand" href="#">
        <span class="brand-logo" aria-hidden="true">🏛️</span>
        <span class="brand-name">Washington Chamber of Commerce</span>
      </a>
    </div>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
    <label for="nav-toggle" class="nav-toggle-label" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="main-nav" aria-label="Primary">
      <ul class="nav-list">
        <li><a href="#" class="active">Directory</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-content" id="page-content">
    <section class="directory">
      <header class="directory-header">
        <h1 class="directory-title">Member Directory</h1>
        <div class="directory-actions" aria-label="View options">
          <span class="view-label">View</span>
          <button type="button" class="view-toggle" data-view="grid" aria-pressed="true">Grid</button>
          <button type="button" class="view-toggle" data-view="list" aria-pressed="false">List</button>
        </div>
      </header>

      <div id="members" class="members" aria-live="polite"></div>

      <noscript>
        <p class="notice">
          JavaScript is required to load the member directory. Please enable JavaScript in your browser.
        </p>
      </noscript>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-contact">
      <h2>Washington Chamber of Commerce</h2>
      <address>
        410 Main Street<br>
        Washington, ST 12345<br>
        <a href="mailto:info@washingtonchamber.example.com">info@washingtonchamber.example.com</a><br>
        <a href="tel:+15551234567">(555) 123-4567</a>
      </address>
    </div>

    <div class="footer-meta">
      <p>Alex Lybbert — WDD 231</p>
      <p>Last modification: <span id="lastModified">--</span></p>
      <p>&copy; <span id="currentYear"></span> Washington Chamber of Commerce</p>
    </div>

    <div class="footer-social" aria-label="Social links">
      <a href="#" aria-label="YouTube"><img src="images/youtube.svg" alt="YouTube" width="24" height="24"></a>
      <a href="#" aria-label="Twitter"><img src="images/twitter.svg" alt="Twitter" width="24" height="24"></a>
      <a href="#" aria-label="LinkedIn"><span aria-hidden="true">🔗</span></a>
    </div>
  </footer>

  <script>
    // Update placeholders for last modified date and current year
    document.getElementById('lastModified').textContent = document.lastModified;
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
